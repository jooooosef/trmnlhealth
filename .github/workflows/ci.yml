name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: sourcemeta/jsonschema@v16.0.0
      - run: jsonschema fmt --check docs/schema/health-summary.v1.schema.json
      - run: jsonschema lint docs/schema/health-summary.v1.schema.json
      - run: jsonschema metaschema docs/schema/health-summary.v1.schema.json
      - run: >-
          jsonschema validate --format-assertion
          docs/schema/health-summary.v1.schema.json
          docs/examples/payload.example.json

  lint-recipe:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipe
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
      - run: gem install trmnl_preview
      - run: trmnlp lint

  # Auto-deploy the recipe to the LaraPaper server on merges to main.
  # Enable once the server exists: set base_url + create the TRMNL_API_KEY secret.
