#
# Changes to this file will be overwritten by `trmnlp pull`.
#
# Docs: https://help.trmnl.com/en/articles/10542599-importing-and-exporting-private-plugins#h_581fb988f0
#
---
strategy: webhook
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: latest
polling_url: ''
polling_headers: ''
name: Apple Health
refresh_interval: 1440
custom_fields:
- keyname: view_style
  field_type: select
  name: View Style
  description: Which page this plugin instance shows. Add the recipe multiple times with different styles to rotate several pages in a playlist.
  options:
  - 'Activity Rings: activity'
  - 'Metric Grid: grid'
  default: activity
- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  description: Daily Apple Health summary on your TRMNL. Pairs with the open-source Health for TRMNL iOS app that reads HealthKit and pushes the data to this plugin's webhook. Setup guide in the repository. Independent community project, not affiliated with TRMNL.
  category: health,fitness
  github_url: https://github.com/jooooosef/trmnl-apple-health
