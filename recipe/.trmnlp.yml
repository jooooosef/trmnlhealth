# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

# values of custom fields (defined in src/settings.yml)
# view_style: activity | grid — flip while `trmnlp serve` runs to
# preview the other pages
custom_fields:
  view_style: activity

# Sample merge variables for local preview. Mirrors the canonical fixture
# in docs/examples/payload.example.json (the merge_variables object).
variables:
  trmnl: {}
  schema_version: 1
  date: "2026-07-04"
  generated_at: "2026-07-04T18:30:00Z"
  timezone: "Europe/Berlin"
  steps: 8342
  distance_km: 6.4
  active_energy_kcal: 512
  exercise_minutes: 32
  stand_hours: 11
  resting_heart_rate_bpm: 58
  hrv_ms: 46
  vo2_max: 42.5
  weight_kg: 78.4
  goals:
    move_kcal: 600
    exercise_minutes: 30
    stand_hours: 12
  sleep:
    start: "23:12"
    end: "07:05"
    total_minutes: 430
    in_bed_minutes: 470
    deep_minutes: 62
    rem_minutes: 98
    core_minutes: 270
    awake_minutes: 12
